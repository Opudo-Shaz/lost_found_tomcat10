version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/openjdk:21.0   # JDK 21 + Maven preinstalled
    working_directory: ~/repo
    steps:
      - checkout
      - restore_cache:
          keys:
            - maven-deps-{{ checksum "pom.xml" }}
            - maven-deps-
      - run:
          name: Install Maven dependencies
          command: mvn dependency:resolve
      - save_cache:
          paths:
            - ~/.m2
          key: maven-deps-{{ checksum "pom.xml" }}

      - run:
          name: Run Unit Tests
          command: mvn test
      - run:
          name: Compile and Build WAR
          command: mvn clean package

      - store_artifacts:
          path: target
          destination: build-artifacts

workflows:
  version: 2
  build_and_test:
    jobs:
      - build-and-test